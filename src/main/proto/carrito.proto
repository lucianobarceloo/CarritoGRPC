syntax = "proto3";

option java_package = "com.tienda.grpc";
option java_multiple_files = true;

service CarritoService {
    // Método para obtener productos disponibles (sin considerar stock)
    rpc obtenerCatalogo (EmptyRequest) returns (CatalogoResponse);
    
    // Método para procesar la compra con validación de inventario
    rpc procesarCarrito (CarritoRequest) returns (CarritoResponse);
}

message EmptyRequest {}

message CatalogoResponse {
    repeated Producto productos = 1;
}

message Producto {
    string id = 1;
    string nombre = 2;
    double precio = 3;
    int32 cantidad = 4; 
}

message CarritoRequest {
    string usuario_id = 1;
    repeated Producto items = 2;
}

message CarritoResponse {
    string transaccion_id = 1;
    double total_neto = 2;
    double impuestos = 3;
    double total_pagar = 4;
    string estado = 5;
}